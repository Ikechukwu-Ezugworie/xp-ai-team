repos:
  - repo: local
    hooks:
      - id: commit-msg
        name: enforce commit format (AI flag required)
        language: system
        stages: [commit-msg]
        entry: >-
          bash -c
          'if ! grep -qE "\[AI:(YES|NO)\]" "$1";
          then echo "ERROR: Commit must include [AI:YES] or [AI:NO]" && exit 1;
          fi' --